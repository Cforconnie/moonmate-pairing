<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonmate 沐月 · 寵物生命靈數百科</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #CFE5D5;
    --bg2: #B8D6B2;
    --bg3: #A6D2C8;
    --teal: #6EA89E;
    --deep: #2A3D35;
    --gold: #9B7E5A;
    --white: #FAF9F6;
    --card: #E8F5EE;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--deep);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 60px 24px 40px;
    position: relative;
  }

  .header-moon {
    width: 120px; height: 120px;
    margin: 0 auto 20px;
    opacity: 0;
    animation: fadeDown 0.8s ease 0.1s forwards;
    object-fit: contain;
    filter: drop-shadow(0 4px 20px rgba(110,168,158,0.25));
  }

  .header-brand {
    font-family: 'Pacifico', cursive;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 400;
    letter-spacing: 6px;
    color: var(--deep);
    opacity: 0;
    animation: fadeDown 0.8s ease 0.2s forwards;
  }

  .header-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--teal);
    margin-top: 6px;
    opacity: 0;
    animation: fadeDown 0.8s ease 0.3s forwards;
  }

  .header-divider {
    width: 32px; height: 0.5px;
    background: var(--gold);
    margin: 20px auto;
    opacity: 0;
    animation: fadeDown 0.8s ease 0.4s forwards;
  }

  .header-desc {
    font-size: 14px;
    font-style: normal;
    color: var(--teal);
    line-height: 1.9;
    max-width: 400px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeDown 0.8s ease 0.5s forwards;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── GRID ── */
  .grid-section {
    padding: 40px 24px 80px;
    max-width: 880px;
    margin: 0 auto;
  }

  .grid-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 32px;
  }

  .num-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  @media (max-width: 600px) {
    .num-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }

  @media (max-width: 380px) {
    .num-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .num-card {
    background: var(--white);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    position: relative;
    overflow: hidden;
  }

  .num-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--bg3);
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 16px;
  }

  .num-card:hover::before { opacity: 0.15; }

  .num-card:hover {
    border-color: var(--teal);
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(42,61,53,0.1);
  }

  .num-card.master {
    background: linear-gradient(135deg, var(--white) 0%, #EDF7F3 100%);
    border-color: var(--gold);
  }

  .num-card.active {
    border-color: var(--teal);
    background: var(--bg3);
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(42,61,53,0.15);
  }

  .num-card.active::before { opacity: 0; }

  .num-number {
    font-family: 'Pacifico', cursive;
    font-size: 36px;
    font-weight: 400;
    color: var(--deep);
    line-height: 1;
    margin-bottom: 6px;
    position: relative; z-index: 1;
  }

  .num-en {
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 2px;
    position: relative; z-index: 1;
  }

  .num-zh {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--deep);
    position: relative; z-index: 1;
  }

  .num-energy {
    display: inline-block;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
    position: relative; z-index: 1;
  }

  .e-fire { background: #FAEEDA; color: #7A4810; }
  .e-earth { background: #E8F0DC; color: #3A5020; }
  .e-water { background: #DCF0EC; color: #1A5048; }
  .e-wind { background: #E8E4F8; color: #3A3080; }
  .e-light { background: #F0EDE4; color: #5A5040; }

  .master-badge {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--gold);
    background: rgba(155,126,90,0.1);
    padding: 2px 6px;
    border-radius: 6px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── DETAIL PANEL ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,61,53,0.5);
    z-index: 100;
    backdrop-filter: blur(4px);
    animation: overlayIn 0.3s ease;
  }

  .detail-overlay.show { display: flex; align-items: center; justify-content: center; padding: 20px; }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .detail-panel {
    background: var(--white);
    border-radius: 24px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: panelIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .detail-header {
    padding: 40px 40px 32px;
    border-bottom: 0.5px solid var(--bg2);
    position: relative;
  }

  .detail-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 0.5px solid var(--bg2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--teal);
    transition: all 0.2s;
  }

  .detail-close:hover {
    background: var(--bg);
    border-color: var(--teal);
  }

  .detail-num {
    font-family: 'Pacifico', cursive;
    font-size: 72px;
    font-weight: 400;
    color: var(--deep);
    line-height: 1;
    margin-bottom: 8px;
  }

  .detail-en {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .detail-zh {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--deep);
    margin-bottom: 12px;
  }

  .detail-energy-tag {
    display: inline-block;
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .detail-body {
    padding: 32px 40px 40px;
  }

  .detail-copy {
    font-size: 15px;
    font-style: normal;
    color: var(--deep);
    line-height: 2.2;
    margin-bottom: 32px;
  }

  .detail-copy p { margin-bottom: 4px; }

  .detail-section-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .crystal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 32px;
  }

  .crystal-item {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .crystal-icon { font-size: 24px; margin-bottom: 6px; }

  .crystal-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
    background: var(--bg);
  }

  .crystal-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .crystal-img:hover { transform: scale(1.05); }

  .crystal-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--bg);
  }

  .crystal-img-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--teal);
    opacity: 0.6;
  }

  .crystal-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--deep);
    margin-bottom: 4px;
  }

  .crystal-role {
    font-size: 10px;
    color: var(--teal);
    letter-spacing: 1px;
  }

  .detail-trait-box {
    background: var(--bg);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .detail-trait-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .detail-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .trait-tag {
    font-size: 11px;
    padding: 4px 12px;
    background: var(--white);
    border-radius: 20px;
    color: var(--deep);
    border: 0.5px solid var(--bg2);
  }

  .detail-cta {
    width: 100%;
    padding: 16px;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .detail-cta:hover { background: var(--deep); }

  /* scrollbar */
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 2px; }

  /* footer */
  footer {
    text-align: center;
    padding: 40px 24px;
    border-top: 0.5px solid var(--bg2);
  }

  .footer-brand {
    font-family: 'Pacifico', cursive;
    font-size: 20px;
    letter-spacing: 5px;
    color: var(--deep);
    margin-bottom: 4px;
  }

  .footer-slogan {
    font-size: 11px;
    font-style: normal;
    color: var(--teal);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>

  </div>
</div>

<footer>
  <p class="footer-brand">MOONMATE</p>
  <p class="footer-slogan">沐月 · One moon. Two souls.</p>
</footer>

// Build grid
const grid = document.getElementById('numGrid');
data.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'num-card' + (d.master ? ' master' : '');
  card.style.animationDelay = `${0.05 * i + 0.3}s`;
  card.onclick = () => openDetail(d);
  card.innerHTML = `
    ${d.master ? '<span class="master-badge">主數</span>' : ''}
    <div class="num-number">${d.num}</div>
    <div class="num-en">${d.en}</div>
    <div class="num-zh">${d.zh}</div>
    <span class="num-energy ${energyClass[d.energy]}">${d.energy}能量</span>
  `;
  grid.appendChild(card);
});

// Open detail
function openDetail(d) {
  document.getElementById('dNum').textContent = d.num;
  document.getElementById('dEn').textContent = d.en;
  document.getElementById('dZh').textContent = d.zh;

  const eTag = document.getElementById('dEnergy');
  eTag.textContent = d.energy + '能量';
  eTag.className = 'detail-energy-tag ' + energyClass[d.energy];

  // 加入角色標籤和內心獨白
  const voiceHtml = d.voice ? `
    <div style="background:var(--bg2);border-radius:12px;padding:16px 20px;margin-bottom:24px;border-left:3px solid var(--gold);">
      <p style="font-size:9px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;">${d.tag} · 內心獨白</p>
      <p style="font-size:14px;color:var(--deep);line-height:1.8;">${d.voice}</p>
    </div>` : '';

  document.getElementById('dCopy').innerHTML = voiceHtml + d.copy.map(l => `<p>${l}</p>`).join('');

  document.getElementById('dCrystals').innerHTML = d.crystals.map(c => `
    <div class="crystal-item">
      <div class="crystal-img-wrap">
        ${c.imgUrl
          ? `<img src="${c.imgUrl}" alt="${c.name}" class="crystal-img">`
          : `<div class="crystal-img-placeholder">
               <span class="crystal-icon">${c.icon}</span>
               <span class="crystal-img-label">圖片即將上線</span>
             </div>`
        }
      </div>
      <div class="crystal-name">${c.name}</div>
      <div class="crystal-role">${c.role}</div>
    </div>
  `).join('');

  // 加入水晶功能描述
  const crystalDescEl = document.getElementById('dCrystalDesc');
  if (crystalDescEl && d.crystalDesc) {
    crystalDescEl.textContent = d.crystalDesc;
  }

  document.getElementById('dTraits').innerHTML = d.traits.map(t =>
    `<span class="trait-tag">${t}</span>`
  ).join('');

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function closeDetail(e) {
  if (e.target === document.getElementById('overlay')) closePanel();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});
</script>
</body>
</html>
